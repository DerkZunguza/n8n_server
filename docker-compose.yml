services:
  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    networks:
      - traefik-public
    # NÃO expõe porta - banco fica interno
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: n8n
    volumes:
      - n8n-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-app
    restart: unless-stopped
    networks:
      - traefik-public
    # NÃO expõe porta - Traefik gerencia
    environment:
      # Banco de dados
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      # Domínio e protocolo
      N8N_HOST: ${N8N_SUBDOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${N8N_SUBDOMAIN}/

      # Segurança
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      # Timezone (ajuste se necessário)
      GENERIC_TIMEZONE: Africa/Maputo
      TZ: Africa/Maputo

      # Execuções (opcional - ajustar conforme necessidade)
      EXECUTIONS_MODE: regular
      N8N_METRICS: false

      # Desbloquear acesso a variáveis de ambiente nos nodes
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"

      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}

      # Ollama (acessível internamente pelo nome do container)
      OLLAMA_HOST: ollama
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}

      # Whisper
      WHISPER_HOST: ${WHISPER_HOST:-whisper}

      # Google Sheets
      GOOGLE_SHEET_ID: ${GOOGLE_SHEET_ID}

    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      # TRAEFIK LABELS
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`${N8N_SUBDOMAIN}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: n8n-whisper
    restart: unless-stopped
    networks:
      - traefik-public
    environment:
      - ASR_MODEL=small
      - ASR_ENGINE=openai_whisper
    volumes:
      - whisper-data:/root/.cache/whisper
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ollama:
    image: ollama/ollama:latest
    container_name: n8n-ollama
    restart: unless-stopped
    networks:
      - traefik-public
    # O N8N acede internamente em http://ollama:11434 (não exposto à internet)
    volumes:
      - ollama-data:/root/.ollama

volumes:
  n8n-postgres-data:
  n8n-data:
  ollama-data:
  whisper-data:

networks:
  traefik-public:
    external: true
